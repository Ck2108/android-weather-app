# =============================================================
# gradle.properties — "Oven Settings"
# =============================================================
# These are settings for HOW Gradle runs, not WHAT it builds.
# Think of it like oven temperature and timer settings.
# =============================================================

# How much memory Gradle can use (2GB). Like setting the oven size.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use Android Studio's JDK so terminal builds match Android Studio (Java 21)
org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home

# Use AndroidX libraries (the modern Android libraries).
# Old projects used "Support Library" — we always use AndroidX now.
android.useAndroidX=true

# Kotlin code formatting style
kotlin.code.style=official

# Each module only sees its OWN resources, not other modules'.
# This makes builds faster and avoids name collisions.
android.nonTransitiveRClass=true
